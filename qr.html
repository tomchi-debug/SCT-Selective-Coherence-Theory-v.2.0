<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCT Paper QR Code</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&family=Josefin+Sans:wght@300;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f7f4ef;
    font-family: 'EB Garamond', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  .card {
    background: #1a1714;
    border-radius: 8px;
    padding: 2.5rem 2rem;
    text-align: center;
    max-width: 380px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }

  .badge {
    font-family: 'Josefin Sans', sans-serif;
    font-size: 0.55rem;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #b8922a;
    margin-bottom: 1.25rem;
  }

  .eq {
    font-family: 'EB Garamond', serif;
    font-size: 2.8rem;
    font-style: italic;
    color: #faf8f5;
    margin-bottom: 0.25rem;
  }

  .eq span { color: #d4a843; }

  .subtitle {
    font-family: 'EB Garamond', serif;
    font-size: 0.85rem;
    font-style: italic;
    color: rgba(250,248,245,0.45);
    margin-bottom: 2rem;
    line-height: 1.5;
  }

  #qrcode {
    background: #faf8f5;
    padding: 1rem;
    border-radius: 6px;
    display: inline-block;
    margin: 0 auto 1.75rem;
  }

  #qrcode canvas, #qrcode img { display: block; }

  .author {
    font-family: 'Josefin Sans', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(250,248,245,0.3);
    margin-bottom: 0.25rem;
  }

  .url-display {
    font-family: 'Josefin Sans', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.05em;
    color: #b8922a;
    word-break: break-all;
  }

  /* Print styles */
  @media print {
    body { background: white; padding: 0; min-height: auto; }
    .card {
      background: white;
      box-shadow: none;
      border: 2px solid #1a1714;
    }
    .badge { color: #b8922a; }
    .eq { color: #1a1714; }
    .eq span { color: #b8922a; }
    .subtitle { color: #6b6560; }
    .author { color: #6b6560; }
    .url-display { color: #b8922a; }
    .update-section { display: none; }
  }

  .update-section {
    margin-top: 2.5rem;
    text-align: center;
  }

  .update-section label {
    display: block;
    font-family: 'Josefin Sans', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #6b6560;
    margin-bottom: 0.5rem;
  }

  .update-section input {
    border: 1px solid #d8d2c8;
    border-radius: 3px;
    padding: 0.5rem 0.75rem;
    font-family: 'Josefin Sans', sans-serif;
    font-size: 0.75rem;
    width: 100%;
    max-width: 400px;
    color: #2a2520;
    background: white;
  }

  .update-section button {
    margin-top: 0.5rem;
    background: #b8922a;
    color: white;
    border: none;
    padding: 0.5rem 1.5rem;
    border-radius: 3px;
    font-family: 'Josefin Sans', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    font-weight: 600;
  }

  .update-section button:hover { background: #d4a843; }

  .print-btn {
    margin-top: 1rem;
    background: #1a1714;
    color: #f7f4ef;
    border: none;
    padding: 0.5rem 1.5rem;
    border-radius: 3px;
    font-family: 'Josefin Sans', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    font-weight: 600;
  }

  .print-btn:hover { background: #2a2520; }

  .hint {
    font-family: 'Josefin Sans', sans-serif;
    font-size: 0.6rem;
    color: #6b6560;
    margin-top: 0.4rem;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<div class="card">
  <div class="badge">Selective Coherence Theory · 2026</div>
  <div class="eq">D = <span>√π</span></div>
  <div class="subtitle">A Universal Decay Exponent<br>in Selective Coherence Theory</div>
  <div id="qrcode"></div>
  <div class="author">Tomasz Adam Markiewicz · 12 April 2026</div>
  <div class="url-display" id="url-display">your-url-here.com</div>
</div>

<div class="update-section">
  <label>Enter your paper URL to generate the QR code</label>
  <input type="text" id="url-input" placeholder="https://your-hosted-paper-url.com" />
  <br>
  <button onclick="updateQR()">Generate QR Code</button>
  <br>
  <button class="print-btn" onclick="window.print()">Print / Save as PDF</button>
  <div class="hint">Host the paper on GitHub Pages (free) and paste the URL above</div>
</div>

<script>
let qr = null;
const defaultUrl = 'https://tmarkiewicz.github.io/sct-paper';

function generateQR(url) {
  document.getElementById('qrcode').innerHTML = '';
  qr = new QRCode(document.getElementById('qrcode'), {
    text: url,
    width: 220,
    height: 220,
    colorDark: '#1a1714',
    colorLight: '#faf8f5',
    correctLevel: QRCode.CorrectLevel.H
  });
  document.getElementById('url-display').textContent = url;
}

function updateQR() {
  const url = document.getElementById('url-input').value.trim();
  if (url) generateQR(url);
}

document.getElementById('url-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') updateQR();
});

// Generate with default on load
generateQR(defaultUrl);
</script>
</body>
</html>
